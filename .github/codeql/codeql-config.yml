name: npm-web-sampler CodeQL Configuration

paths:
  - .github
  - .vscode
  - src
  - tests
  - pipelines
  - features
  - env
  - scripts

paths-ignore:
  - .venv
  - typings
  - tmp
  - dist
  #
  # commons
  - _scripts
  - repositories
  #
  # node
  - node_modules

  # other folders
  - "*cache"
  - "*_cache"
  - .mypy_cache
  - .pytest_cache
