name: CodeQL Configuration

paths:
  - .github
  - src
  - tests
  - features
  - scripts

paths-ignore:
  #
  # python
  - .venv
  - env
  - dist
  - typings
  - tmp
  #
  # cache folders
  - "*cache"
  - "*_cache"
  - .mypy_cache
  - .pytest_cache
  #
  - .vscode
  - assets
  - pipelines
  #
  # commons
  - _scripts
  - repositories
  #
  # node
  - node_modules
